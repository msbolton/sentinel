<div class="map-container">
  <div #cesiumContainer class="cesium-viewer"></div>

  <!-- Map Controls -->
  <div class="map-controls">
    @if (showLayerPanel()) {
      <div class="layer-panel">
        <div class="layer-panel-header">
          <h3>Layers</h3>
          <button class="btn-ghost btn-sm" (click)="showLayerPanel.set(false)">&times;</button>
        </div>
        <div class="layer-list">
          @for (layer of layers; track layer.entityType) {
            <label class="layer-item">
              <input
                type="checkbox"
                [(ngModel)]="layer.visible"
                (change)="toggleLayer(layer)"
              />
              <span class="layer-color" [style.background]="layer.color"></span>
              <span class="layer-name">{{ layer.name }}</span>
            </label>
          }
        </div>
      </div>
    }

    <div class="control-buttons">
      <button
        class="control-btn"
        (click)="showLayerPanel.set(!showLayerPanel())"
        title="Toggle Layers"
        [class.active]="showLayerPanel()">
        &#9776;
      </button>
      <button class="control-btn" (click)="resetView()" title="Reset View">
        &#127758;
      </button>
      <button class="control-btn" (click)="goToMyLocation()" title="My Location">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v4"/>
          <path d="M12 18v4"/>
          <path d="M2 12h4"/>
          <path d="M18 12h4"/>
        </svg>
      </button>
      <button
        class="control-btn"
        (click)="buildingsService.toggle()"
        title="Toggle 3D Buildings"
        [class.active]="buildingsService.buildings3dEnabled()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
          <path d="M9 22V12h6v10"/>
          <path d="M8 6h.01"/>
          <path d="M16 6h.01"/>
          <path d="M12 6h.01"/>
          <path d="M12 10h.01"/>
          <path d="M8 10h.01"/>
          <path d="M16 10h.01"/>
        </svg>
      </button>
      <button class="control-btn" (click)="toggleFullscreen()" title="Fullscreen">
        &#9974;
      </button>
    </div>
  </div>

  <!-- Flying Indicator -->
  @if (flyingTo()) {
    <div class="flying-indicator">
      <div class="loading-spinner"></div>
      <span>Flying to {{ flyingTo() }}...</span>
    </div>
  }

  <!-- Entity Detail Panel -->
  <app-entity-detail-panel
    [entity]="selectedEntity()"
    [class.panel-offset]="panelRouteActive()"
    (close)="closeEntityPopup()"
    (flyTo)="flyToEntity($event)"
  />

  <!-- Federation Panel -->
  <app-federation-panel (togglePeer)="onToggleFederationPeer($event)" />
</div>
