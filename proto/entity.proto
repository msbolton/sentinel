syntax = "proto3";

package sentinel.v1;

import "google/protobuf/timestamp.proto";
import "common.proto";

option go_package = "buf.build/sentinel/api/sentinel/v1";

// EntityType enumerates the broad categories of trackable entities within
// the SENTINEL platform.
enum EntityType {
  ENTITY_TYPE_UNKNOWN = 0;
  ENTITY_TYPE_PERSON = 1;
  ENTITY_TYPE_VEHICLE = 2;
  ENTITY_TYPE_VESSEL = 3;
  ENTITY_TYPE_AIRCRAFT = 4;
  ENTITY_TYPE_FACILITY = 5;
  ENTITY_TYPE_EQUIPMENT = 6;
  ENTITY_TYPE_UNIT = 7;
  ENTITY_TYPE_SIGNAL = 8;
  ENTITY_TYPE_CYBER = 9;
  ENTITY_TYPE_SENSOR = 10;
  ENTITY_TYPE_SATELLITE = 11;
  ENTITY_TYPE_DRONE = 12;
}

// EntitySource identifies the intelligence discipline that produced or
// reported an entity.
enum EntitySource {
  ENTITY_SOURCE_UNSPECIFIED = 0;
  ENTITY_SOURCE_HUMINT = 1;
  ENTITY_SOURCE_SIGINT = 2;
  ENTITY_SOURCE_GEOINT = 3;
  ENTITY_SOURCE_OSINT = 4;
  ENTITY_SOURCE_MASINT = 5;
  ENTITY_SOURCE_CYBER = 6;
  ENTITY_SOURCE_MANUAL = 7;
  ENTITY_SOURCE_AIS = 8;
  ENTITY_SOURCE_ADS_B = 9;
  ENTITY_SOURCE_LINK16 = 10;
  ENTITY_SOURCE_GPS = 11;
  ENTITY_SOURCE_RADAR = 12;
  ENTITY_SOURCE_CELESTRAK = 13;
  ENTITY_SOURCE_OPENSKY = 14;
  ENTITY_SOURCE_ADSB_LOL = 15;
}

// Affiliation identifies the disposition or allegiance of an entity relative
// to the operating force.
enum Affiliation {
  AFFILIATION_UNSPECIFIED = 0;
  AFFILIATION_FRIENDLY = 1;
  AFFILIATION_HOSTILE = 2;
  AFFILIATION_NEUTRAL = 3;
  AFFILIATION_UNKNOWN = 4;
  AFFILIATION_ASSUMED_FRIENDLY = 5;
  AFFILIATION_SUSPECT = 6;
  AFFILIATION_PENDING = 7;
}

// CharacterizationState describes how confidently an entity has been identified.
enum CharacterizationState {
  CHARACTERIZATION_STATE_UNSPECIFIED = 0;
  CHARACTERIZATION_STATE_ASSESSED = 1;
  CHARACTERIZATION_STATE_ASSUMED = 2;
  CHARACTERIZATION_STATE_SUSPECTED = 3;
  CHARACTERIZATION_STATE_UNCHARACTERIZED = 4;
}

// Orientation describes the 3-axis attitude of an entity (yaw/pitch/roll).
message Orientation {
  double yaw = 1;    // Degrees from north, clockwise
  double pitch = 2;  // Degrees, positive = nose up
  double roll = 3;   // Degrees, positive = right wing down
}

// GeodeticVelocity is a 3-axis velocity vector in the North-East-Up frame.
message GeodeticVelocity {
  double north = 1;  // m/s northward
  double east = 2;   // m/s eastward
  double up = 3;     // m/s upward
}

// GeodeticAcceleration is a 3-axis acceleration vector in North-East-Up frame.
message GeodeticAcceleration {
  double north = 1;  // m/s² northward
  double east = 2;   // m/s² eastward
  double up = 3;     // m/s² upward
}

// PositionCovariance is a 3x3 symmetric matrix (upper triangle) in meters².
message PositionCovariance {
  double pn_pn = 1;
  double pn_pe = 2;
  double pn_pu = 3;
  double pe_pe = 4;
  double pe_pu = 5;
  double pu_pu = 6;
}

// PositionVelocityCovariance is a full 3x3 cross-covariance matrix.
message PositionVelocityCovariance {
  double pn_vn = 1; double pn_ve = 2; double pn_vu = 3;
  double pe_vn = 4; double pe_ve = 5; double pe_vu = 6;
  double pu_vn = 7; double pu_ve = 8; double pu_vu = 9;
}

// VelocityCovariance is a 3x3 symmetric matrix (upper triangle) in (m/s)².
message VelocityCovariance {
  double vn_vn = 1;
  double vn_ve = 2;
  double vn_vu = 3;
  double ve_ve = 4;
  double ve_vu = 5;
  double vu_vu = 6;
}

// KinematicState is the full kinematic state vector per UC2 TrackPointRecordType.
message KinematicState {
  GeodeticVelocity velocity = 1;
  GeodeticAcceleration acceleration = 2;
  PositionCovariance position_covariance = 3;
  PositionVelocityCovariance position_velocity_covariance = 4;
  VelocityCovariance velocity_covariance = 5;
}

// MeasurementUncertainty captures observation quality metrics.
message MeasurementUncertainty {
  double circular_error = 1;   // CEP meters (95th percentile)
  double semi_major = 2;       // Error ellipse semi-major (meters)
  double semi_minor = 3;       // Error ellipse semi-minor (meters)
  double orientation = 4;      // Error ellipse orientation (degrees)
  double altitude_error = 5;   // Altitude uncertainty (meters)
  double confidence = 6;       // Detection confidence 0.0-1.0
}

// Dimensions describes the physical size of an entity.
message Dimensions {
  double length = 1;  // meters
  double width = 2;   // meters
  double height = 3;  // meters
}

// Observation records a single sensor measurement of an entity.
message Observation {
  string id = 1;
  string entity_id = 2;

  // Who observed
  string sensor_id = 3;
  string feed_id = 4;
  EntitySource source = 5;

  // Position
  Coordinate position = 6;
  double altitude = 7;

  // Kinematics
  double heading = 8;
  double speed_knots = 9;
  double course = 10;
  GeodeticVelocity velocity = 11;
  GeodeticAcceleration acceleration = 12;

  // Uncertainty
  MeasurementUncertainty uncertainty = 13;
  PositionCovariance position_covariance = 14;
  PositionVelocityCovariance position_velocity_covariance = 15;
  VelocityCovariance velocity_covariance = 16;

  // Detection metadata
  double detection_confidence = 17;
  TrackProcessingState track_processing_state = 18;

  // Sensor-relative measurements
  double azimuth = 19;
  double elevation = 20;
  double range = 21;
  double azimuth_error = 22;
  double elevation_error = 23;
  double range_error = 24;

  // Timestamp
  google.protobuf.Timestamp timestamp = 25;
}

// Entity represents a discrete object of intelligence interest that can be
// tracked, analyzed, and linked to other entities on the SENTINEL platform.
message Entity {
  // Unique identifier for the entity.
  string id = 1;

  // The broad category of this entity.
  EntityType entity_type = 2;

  // Human-readable display name.
  string name = 3;

  // Free-text description or summary of the entity.
  string description = 4;

  // The intelligence discipline that originated this entity.
  EntitySource source = 5;

  // Security classification level assigned to this entity.
  Classification classification = 6;

  // Last known geospatial position.
  Coordinate position = 7;

  // Current heading in degrees true north (0-360).
  double heading = 8;

  // Current speed in nautical knots.
  double speed_knots = 9;

  // Current course over ground in degrees true north (0-360).
  double course = 10;

  // Arbitrary key-value metadata associated with this entity.
  map<string, string> metadata = 11;

  // Affiliation labels (e.g., organization names, faction identifiers).
  repeated string affiliations = 12;

  // MIL-STD-2525D symbol identification code for rendering on tactical displays.
  string mil_std_2525d_symbol = 13;

  // Timestamp when the entity was first created.
  google.protobuf.Timestamp created_at = 14;

  // Timestamp when the entity was last modified.
  google.protobuf.Timestamp updated_at = 15;

  // Timestamp when the entity was last observed by a sensor or source.
  google.protobuf.Timestamp last_seen_at = 16;

  // UC2-informed identity & confidence
  Affiliation affiliation = 17;
  int32 identity_confidence = 18;          // 0-10 scale
  CharacterizationState characterization = 19;

  // Track context
  TrackEnvironment track_environment = 20;
  TrackProcessingState track_processing_state = 21;

  // Extended kinematics
  double altitude = 22;
  Orientation orientation = 23;
  KinematicState kinematics = 24;

  // Operational status
  OperationalStatus operational_status = 25;
  DamageAssessment damage_assessment = 26;
  int32 damage_confidence = 27;            // 0-10

  // Physical characteristics
  Dimensions dimensions = 28;
  string country_of_origin = 29;           // ISO 3166-1 alpha-2

  // Protocol-specific data (JSONB in DB, opaque bytes in proto)
  bytes platform_data = 30;

  // Source identity
  string source_entity_id = 31;

  // Measurement quality
  double circular_error = 32;
  string last_observation_source = 33;
}

// EntityEventType describes the kind of mutation that occurred on an entity.
enum EntityEventType {
  ENTITY_EVENT_TYPE_UNSPECIFIED = 0;
  ENTITY_EVENT_TYPE_CREATED = 1;
  ENTITY_EVENT_TYPE_UPDATED = 2;
  ENTITY_EVENT_TYPE_DELETED = 3;
  ENTITY_EVENT_TYPE_POSITION_UPDATE = 4;
}

// EntityEvent is published whenever an entity is created, modified, removed,
// or has its position updated. Used for real-time streaming to subscribers.
message EntityEvent {
  // Unique event identifier.
  string event_id = 1;

  // The full entity snapshot at the time of the event.
  Entity entity = 2;

  // The type of mutation that triggered this event.
  EntityEventType event_type = 3;

  // When the event occurred.
  google.protobuf.Timestamp timestamp = 4;
}

// CreateEntityRequest contains the fields required to register a new entity.
message CreateEntityRequest {
  EntityType entity_type = 1;
  string name = 2;
  string description = 3;
  EntitySource source = 4;
  Classification classification = 5;
  Coordinate position = 6;
  double heading = 7;
  double speed_knots = 8;
  double course = 9;
  map<string, string> metadata = 10;
  repeated string affiliations = 11;
  string mil_std_2525d_symbol = 12;
}

// CreateEntityResponse returns the newly created entity.
message CreateEntityResponse {
  Entity entity = 1;
}

// UpdateEntityRequest carries the fields to update on an existing entity.
// Only non-default fields are applied (partial update semantics).
message UpdateEntityRequest {
  // The ID of the entity to update.
  string id = 1;

  EntityType entity_type = 2;
  string name = 3;
  string description = 4;
  EntitySource source = 5;
  Classification classification = 6;
  Coordinate position = 7;
  double heading = 8;
  double speed_knots = 9;
  double course = 10;
  map<string, string> metadata = 11;
  repeated string affiliations = 12;
  string mil_std_2525d_symbol = 13;
}

// UpdateEntityResponse returns the entity after the update has been applied.
message UpdateEntityResponse {
  Entity entity = 1;
}

// GetEntityRequest retrieves a single entity by its identifier.
message GetEntityRequest {
  string id = 1;
}

// GetEntityResponse returns the requested entity.
message GetEntityResponse {
  Entity entity = 1;
}

// QueryEntitiesRequest provides spatial, type, source, classification,
// and free-text filters for searching entities.
message QueryEntitiesRequest {
  // Restrict results to entities within this geographic bounding box.
  BoundingBox bounding_box = 1;

  // Filter by one or more entity types.
  repeated EntityType entity_types = 2;

  // Filter by one or more intelligence sources.
  repeated EntitySource sources = 3;

  // Maximum classification level the caller is authorized to view.
  Classification classification_max = 4;

  // Free-text search query matched against name, description, and metadata.
  string text_query = 5;

  // Pagination parameters.
  Pagination pagination = 6;
}

// QueryEntitiesResponse contains the matching entities and pagination info.
message QueryEntitiesResponse {
  // The entities matching the query filters.
  repeated Entity entities = 1;

  // Pagination details including total count.
  Pagination pagination = 2;
}
