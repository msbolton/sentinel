syntax = "proto3";

package sentinel.v1;

import "google/protobuf/timestamp.proto";

option go_package = "buf.build/sentinel/api/sentinel/v1";

// UUID is a wrapper around a string-encoded UUID value.
// Used to provide a typed alias for entity identifiers across services.
message UUID {
  string value = 1;
}

// Coordinate represents a geospatial position in a given coordinate system.
message Coordinate {
  // Latitude in decimal degrees (WGS84).
  double latitude = 1;

  // Longitude in decimal degrees (WGS84).
  double longitude = 2;

  // Altitude above mean sea level in meters. Optional.
  double altitude_meters = 3;

  // The coordinate reference system. Defaults to "EPSG:4326" (WGS84) if unset.
  string coordinate_system = 4;
}

// BoundingBox defines a geographic extent using north/south/east/west bounds.
message BoundingBox {
  // Northern latitude boundary in decimal degrees.
  double north = 1;

  // Southern latitude boundary in decimal degrees.
  double south = 2;

  // Eastern longitude boundary in decimal degrees.
  double east = 3;

  // Western longitude boundary in decimal degrees.
  double west = 4;
}

// Timestamp wraps google.protobuf.Timestamp for consistent usage across
// all SENTINEL services.
message Timestamp {
  google.protobuf.Timestamp value = 1;
}

// Pagination carries paging parameters for list/query requests and responses.
message Pagination {
  // The current page number (1-indexed).
  int32 page = 1;

  // The number of items per page.
  int32 page_size = 2;

  // The total number of items matching the query. Set in responses only.
  int32 total = 3;
}

// TrackEnvironment identifies the domain in which a tracked entity operates.
enum TrackEnvironment {
  TRACK_ENVIRONMENT_UNSPECIFIED = 0;
  TRACK_ENVIRONMENT_AIR = 1;
  TRACK_ENVIRONMENT_SEA_SURFACE = 2;
  TRACK_ENVIRONMENT_SUBSURFACE = 3;
  TRACK_ENVIRONMENT_GROUND = 4;
  TRACK_ENVIRONMENT_SPACE = 5;
  TRACK_ENVIRONMENT_UNKNOWN = 6;
}

// TrackProcessingState describes the processing/quality state of a track.
enum TrackProcessingState {
  TRACK_PROCESSING_STATE_UNSPECIFIED = 0;
  TRACK_PROCESSING_STATE_LIVE = 1;
  TRACK_PROCESSING_STATE_PREDICTED = 2;
  TRACK_PROCESSING_STATE_DEAD_RECKONED = 3;
  TRACK_PROCESSING_STATE_HYPOTHESIZED = 4;
  TRACK_PROCESSING_STATE_HISTORICAL = 5;
}

// NavigationalStatus represents AIS navigational status codes.
enum NavigationalStatus {
  NAVIGATIONAL_STATUS_UNSPECIFIED = 0;
  NAVIGATIONAL_STATUS_UNDER_WAY_USING_ENGINE = 1;
  NAVIGATIONAL_STATUS_AT_ANCHOR = 2;
  NAVIGATIONAL_STATUS_NOT_UNDER_COMMAND = 3;
  NAVIGATIONAL_STATUS_RESTRICTED_MANOEUVRABILITY = 4;
  NAVIGATIONAL_STATUS_CONSTRAINED_BY_DRAUGHT = 5;
  NAVIGATIONAL_STATUS_MOORED = 6;
  NAVIGATIONAL_STATUS_AGROUND = 7;
  NAVIGATIONAL_STATUS_ENGAGED_IN_FISHING = 8;
  NAVIGATIONAL_STATUS_UNDER_WAY_SAILING = 9;
  NAVIGATIONAL_STATUS_AIS_SART = 10;
  NAVIGATIONAL_STATUS_UNKNOWN = 11;
}

// OperationalStatus reflects entity readiness/availability (UC2 AvailabilityCode).
enum OperationalStatus {
  OPERATIONAL_STATUS_UNSPECIFIED = 0;
  OPERATIONAL_STATUS_OPERATIONAL = 1;
  OPERATIONAL_STATUS_DEGRADED = 2;
  OPERATIONAL_STATUS_DAMAGED = 3;
  OPERATIONAL_STATUS_DESTROYED = 4;
  OPERATIONAL_STATUS_INACTIVE = 5;
  OPERATIONAL_STATUS_UNKNOWN = 6;
}

// DamageAssessment indicates the assessed damage level of an entity.
enum DamageAssessment {
  DAMAGE_ASSESSMENT_UNSPECIFIED = 0;
  DAMAGE_ASSESSMENT_NONE = 1;
  DAMAGE_ASSESSMENT_LIGHT = 2;
  DAMAGE_ASSESSMENT_MODERATE = 3;
  DAMAGE_ASSESSMENT_HEAVY = 4;
  DAMAGE_ASSESSMENT_DESTROYED = 5;
  DAMAGE_ASSESSMENT_UNKNOWN = 6;
}

// Classification represents the security classification level of an entity
// or piece of intelligence.
enum Classification {
  CLASSIFICATION_UNSPECIFIED = 0;
  CLASSIFICATION_UNCLASSIFIED = 1;
  CLASSIFICATION_CONFIDENTIAL = 2;
  CLASSIFICATION_SECRET = 3;
  CLASSIFICATION_TOP_SECRET = 4;
}
