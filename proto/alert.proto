syntax = "proto3";

package sentinel.v1;

import "google/protobuf/timestamp.proto";
import "common.proto";

option go_package = "buf.build/sentinel/api/sentinel/v1";

// AlertSeverity indicates the urgency level of an alert.
enum AlertSeverity {
  ALERT_SEVERITY_UNSPECIFIED = 0;
  ALERT_SEVERITY_INFO = 1;
  ALERT_SEVERITY_LOW = 2;
  ALERT_SEVERITY_MEDIUM = 3;
  ALERT_SEVERITY_HIGH = 4;
  ALERT_SEVERITY_CRITICAL = 5;
}

// AlertType categorizes the condition or pattern that triggered an alert.
enum AlertType {
  ALERT_TYPE_UNSPECIFIED = 0;
  ALERT_TYPE_GEOFENCE_BREACH = 1;
  ALERT_TYPE_SPEED_ANOMALY = 2;
  ALERT_TYPE_PATTERN_DEVIATION = 3;
  ALERT_TYPE_PROXIMITY = 4;
  ALERT_TYPE_COMMUNICATION_ANOMALY = 5;
  ALERT_TYPE_NEW_ENTITY = 6;
  ALERT_TYPE_ENTITY_CLASSIFICATION_CHANGE = 7;
}

// GeofenceRule defines a geographic polygon boundary and the conditions
// under which entity movement through it triggers an alert.
message GeofenceRule {
  // Unique identifier for this rule.
  string rule_id = 1;

  // Human-readable name for the geofence.
  string name = 2;

  // Ordered vertices of the geofence polygon. The polygon is implicitly
  // closed (last vertex connects back to the first).
  repeated Coordinate polygon = 3;

  // Entity types to monitor against this geofence.
  repeated EntityType monitored_entity_types = 4;

  // Fire an alert when an entity enters the polygon.
  bool trigger_on_enter = 5;

  // Fire an alert when an entity exits the polygon.
  bool trigger_on_exit = 6;
}

// Alert represents a single alert instance generated by the platform when
// a rule or anomaly detection condition is met.
message Alert {
  // Unique identifier for this alert.
  string alert_id = 1;

  // The type of condition that triggered the alert.
  AlertType alert_type = 2;

  // Severity level of the alert.
  AlertSeverity severity = 3;

  // Short summary of the alert.
  string title = 4;

  // Detailed description of what triggered the alert.
  string description = 5;

  // The primary entity involved in the alert.
  string entity_id = 6;

  // Additional entities related to the alert (e.g., proximity targets).
  repeated string related_entity_ids = 7;

  // Geographic position where the alert condition was observed.
  Coordinate position = 8;

  // The rule that generated this alert, if applicable.
  string rule_id = 9;

  // When the alert was created.
  google.protobuf.Timestamp created_at = 10;

  // When the alert was acknowledged by an operator. Unset if not yet acknowledged.
  google.protobuf.Timestamp acknowledged_at = 11;

  // Identifier of the user who acknowledged the alert.
  string acknowledged_by = 12;

  // Arbitrary key-value metadata associated with this alert.
  map<string, string> metadata = 13;
}

// CreateAlertRuleRequest registers a new geofence-based alert rule.
message CreateAlertRuleRequest {
  // Human-readable name for the rule.
  string name = 1;

  // The geofence polygon vertices.
  repeated Coordinate polygon = 2;

  // Entity types the rule monitors.
  repeated EntityType monitored_entity_types = 3;

  // Whether to trigger on polygon entry.
  bool trigger_on_enter = 4;

  // Whether to trigger on polygon exit.
  bool trigger_on_exit = 5;
}

// CreateAlertRuleResponse returns the newly created rule.
message CreateAlertRuleResponse {
  GeofenceRule rule = 1;
}

// GetAlertsRequest queries alerts using a combination of filters.
message GetAlertsRequest {
  // Minimum severity to include in results.
  AlertSeverity severity_min = 1;

  // Filter by one or more alert types.
  repeated AlertType alert_types = 2;

  // Filter to alerts involving a specific entity.
  string entity_id = 3;

  // Restrict to alerts within this geographic bounding box.
  BoundingBox bounding_box = 4;

  // Start of the time range (inclusive).
  google.protobuf.Timestamp start_time = 5;

  // End of the time range (inclusive).
  google.protobuf.Timestamp end_time = 6;

  // Filter by acknowledgement status. If unset, returns all alerts.
  bool acknowledged = 7;

  // Pagination parameters.
  Pagination pagination = 8;
}

// GetAlertsResponse contains matching alerts and pagination details.
message GetAlertsResponse {
  // Alerts matching the query filters.
  repeated Alert alerts = 1;

  // Pagination details including total count.
  Pagination pagination = 2;
}

// AcknowledgeAlertRequest marks an alert as acknowledged by an operator.
message AcknowledgeAlertRequest {
  // The alert to acknowledge.
  string alert_id = 1;

  // The user performing the acknowledgement.
  string acknowledged_by = 2;
}

// AcknowledgeAlertResponse returns the alert after acknowledgement.
message AcknowledgeAlertResponse {
  Alert alert = 1;
}

// AlertEventType describes the lifecycle stage of an alert event.
enum AlertEventType {
  ALERT_EVENT_TYPE_UNSPECIFIED = 0;
  ALERT_EVENT_TYPE_TRIGGERED = 1;
  ALERT_EVENT_TYPE_ACKNOWLEDGED = 2;
  ALERT_EVENT_TYPE_RESOLVED = 3;
}

// AlertEvent is published when an alert is triggered, acknowledged, or
// resolved. Used for real-time streaming to subscribers.
message AlertEvent {
  // The full alert snapshot at the time of the event.
  Alert alert = 1;

  // The lifecycle stage of this event.
  AlertEventType event_type = 2;
}
